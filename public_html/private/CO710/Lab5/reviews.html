<!DOCTYPE html>
<html lang="en">
	<head> <meta charset="UTF-8">
		<title> Travel Reviews </title>
<!-- _______________________STYLING BOX ___________________________-->
<style>
	
	.inside {
		display: block;
	}
	
</style>
<!-- _______________________STYLING BOX ___________________________-->
</head>

<body>

<form>
<fieldset>
	<fieldset class="inside">
	<legend>Trip Reviews</legend>
		
		<div>
			<label for="five"> five </label>
			<input type="radio" id="five" name="rating" value="five">
		</div>
			
		<div>
			<label for="four"> four </label>
			<input type="radio" id="four" name="rating" value="four">
		</div>
		
		<div>
			<label for="three"> three </label>
			<input type="radio" id="three" name="rating" value="three">
		</div>
			
		<div>
			<label for="two"> two </label>
			<input type="radio" id="two" name="rating" value="two">
		</div>
		
		<div>
			<label for="one"> one </label>
			<input type="radio" id="one" name="rating" value="one">
		</div>
		
		<div>		
			<label>Comments</label>
			<input type="textarea" name="comment" placeholder="comments">
		</div>
	</fieldset>
	
	<fieldset>
		<legend> I would be interested in trips to these areas: (check all that apply) </legend>
		
			<div>
				<input type="checkbox" name="africa" id="africa" value="africa">
				<label for="africa">Africa</label>
			</div>
			
			<div>
				<input type="checkbox" name="asia" id="asia" value="asia">
				<label for="asia">Asia</label>
			</div>
			
			<div>
				<input type="checkbox" name="na" id="na" value="na">
				<label for="na">North America</label>
			</div>
			
			<div>
				<input type="checkbox" name="" id="" value="">
				<label for="">South America</label>
			</div>
			
			<div>
				<input type="checkbox" name="" id="" value="">
				<label for="">Other (please specify)</label>
			</div>
		
		
		
	</fieldset>
</fieldset>
</form>
	
	
</body>
	
	
</html>
